services:
  web:
    build: .
    container_name: backend-web
    restart: unless-stopped
    command: >
      sh -c "uv sync --frozen --no-dev &&
      .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_NAME: ${APP_NAME:-Backend API}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-backend}:${POSTGRES_PASSWORD:-backend}@postgres:5432/${POSTGRES_DB:-backend}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - web_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backend}
      POSTGRES_DB: ${POSTGRES_DB:-backend}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  web_venv:
